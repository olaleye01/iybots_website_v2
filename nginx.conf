server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Cache static assets
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2|woff|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
