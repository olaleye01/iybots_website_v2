<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Iybots Technologies</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="iybots icon w.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #080808;
            --accent: #00ffcc;
            --accent-2: #ff3c6e;
            --text: #f0ece3;
            --text-muted: #6b6660;
            --text-dim: #3a3632;
            --border: rgba(0,255,204,0.14);
            --grid: rgba(0,255,204,0.035);
        }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Grid background */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 72px 72px;
            animation: gridBreath 9s ease-in-out infinite;
        }
        @keyframes gridBreath {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.35; }
        }

        /* Glow */
        .bg-glow {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,255,204,0.06) 0%, transparent 68%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 48px 24px;
        }

        .eyebrow {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .eyebrow::before, .eyebrow::after {
            content: '';
            width: 32px; height: 1px;
            background: var(--accent);
            opacity: 0.45;
        }

        .code {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(8rem, 22vw, 18rem);
            line-height: 0.85;
            color: var(--text);
            letter-spacing: -0.02em;
            position: relative;
            display: inline-block;
        }
        .code .four-accent { color: var(--accent); }

        .msg {
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-muted);
            margin: 32px 0 48px;
            line-height: 1.7;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
        }

        .actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-prim, .btn-sec {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 15px 34px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.22s;
        }
        .btn-prim {
            background: var(--accent);
            color: var(--bg);
        }
        .btn-prim:hover { background: #00e8bb; transform: translateY(-2px); }
        .btn-sec {
            color: var(--text-muted);
            border: 1px solid var(--text-dim);
        }
        .btn-sec:hover { color: var(--text); border-color: var(--text-muted); }

        /* Logo */
        .logo {
            position: fixed;
            top: 28px; left: 48px;
        }
        .logo img { height: 28px; width: auto; opacity: 0.7; }

        @media (max-width: 600px) {
            .logo { left: 24px; top: 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <a href="/" class="logo"><img src="IYBOTS LOGO W.svg" alt="Iybots Technologies"></a>

    <div class="content">
        <div class="eyebrow">Error &nbsp;·&nbsp; Page Not Found</div>
        <div class="code">
            <span class="four-accent">4</span>0<span class="four-accent">4</span>
        </div>
        <p class="msg">This page doesn't exist or was moved. Let's get you back on track.</p>
        <div class="actions">
            <a href="/" class="btn-prim">Go Home →</a>
            <a href="/#cta" class="btn-sec">Contact Us</a>
        </div>
    </div>
</body>
</html>
